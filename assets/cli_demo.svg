<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
      .fm{font-family:'Fira Code',monospace}.fs{font-family:'Inter',sans-serif}
      
      /* Subtle breathing animations for color blobs behind glass */
      @keyframes floatBlob1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, -20px) scale(1.15); }
      }
      @keyframes floatBlob2 {
        0%, 100% { transform: translate(0, 0) scale(1.2); }
        50% { transform: translate(-40px, 30px) scale(0.95); }
      }
      @keyframes floatBlob3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(20px, 40px) scale(1.1); }
      }
      .blob1 { animation: floatBlob1 8s ease-in-out infinite; }
      .blob2 { animation: floatBlob2 10s ease-in-out infinite; }
      .blob3 { animation: floatBlob3 9s ease-in-out infinite; }

      /* Floating animations for the glass panes */
      @keyframes floatCard1 {
        0%, 100% { transform: translate(110px, 60px) rotate(-5deg); }
        50% { transform: translate(110px, 50px) rotate(-4.5deg); }
      }
      @keyframes floatCard2 {
        0%, 100% { transform: translate(430px, 170px) rotate(-5deg); }
        50% { transform: translate(430px, 182px) rotate(-5.5deg); }
      }
      @keyframes floatCard3 {
        0%, 100% { transform: translate(300px, 310px) rotate(-5deg); }
        50% { transform: translate(300px, 302px) rotate(-4deg); }
      }
      .pane1 { animation: floatCard1 6s ease-in-out infinite; }
      .pane2 { animation: floatCard2 7s ease-in-out infinite 0.5s; }
      .pane3 { animation: floatCard3 5.5s ease-in-out infinite 1s; }

      /* Neon Badge Float */
      @keyframes floatBadge {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .badge-f { animation: floatBadge 4s ease-in-out infinite; }

      /* Glass shimmer sweep */
      @keyframes sweep {
        0% { stop-color: rgba(255, 255, 255, 0.1); }
        50% { stop-color: rgba(255, 255, 255, 0.28); }
        100% { stop-color: rgba(255, 255, 255, 0.1); }
      }
      .shimmer-color { animation: sweep 4s ease-in-out infinite; }
    </style>

    <!-- Heavy blur filter for background refraction -->
    <filter id="refract-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" />
    </filter>

    <!-- Translucent Light Glass Overlay -->
    <linearGradient id="glass-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.16)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.03)" />
    </linearGradient>

    <!-- Translucent Dark Glass Overlay -->
    <linearGradient id="glass-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(15, 23, 42, 0.45)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 0.15)" />
    </linearGradient>

    <!-- Animated Shimmer Gradient -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop class="shimmer-color" offset="0%" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.02)" />
      <stop class="shimmer-color" offset="100%" />
    </linearGradient>

    <!-- Drop Shadows for Glass Sheets -->
    <filter id="shadow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#7c3aed" flood-opacity="0.25" />
    </filter>
    <filter id="shadow-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#06b6d4" flood-opacity="0.22" />
    </filter>
    <filter id="shadow-button" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#f43f5e" flood-opacity="0.3" />
    </filter>

    <!-- Clip Paths for refraction inside each card shape -->
    <clipPath id="clip-card1">
      <rect width="320" height="200" rx="20" />
    </clipPath>
    <clipPath id="clip-card2">
      <rect width="320" height="200" rx="20" />
    </clipPath>
    <clipPath id="clip-card3">
      <rect width="220" height="56" rx="14" />
    </clipPath>

    <!-- Mesh Gradient Backdrop Lights -->
    <radialGradient id="purple-mesh" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cyan-mesh" cx="80%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Solid dark universe background -->
  <rect class="bg" width="860" height="480" rx="18" />
  <rect fill="url(#purple-mesh)" width="860" height="480" rx="18" />
  <rect fill="url(#cyan-mesh)" width="860" height="480" rx="18" />

  <!-- Backdrop mesh dot patterns -->
  <g opacity="0.025">
    <circle cx="50" cy="50" r="1.5" fill="#fff" /><circle cx="150" cy="50" r="1.5" fill="#fff" /><circle cx="250" cy="50" r="1.5" fill="#fff" />
    <circle cx="50" cy="150" r="1.5" fill="#fff" /><circle cx="150" cy="150" r="1.5" fill="#fff" /><circle cx="250" cy="150" r="1.5" fill="#fff" />
    <circle cx="50" cy="250" r="1.5" fill="#fff" /><circle cx="150" cy="250" r="1.5" fill="#fff" /><circle cx="250" cy="250" r="1.5" fill="#fff" />
    <circle cx="650" cy="250" r="1.5" fill="#fff" /><circle cx="750" cy="250" r="1.5" fill="#fff" /><circle cx="850" cy="250" r="1.5" fill="#fff" />
    <circle cx="650" cy="350" r="1.5" fill="#fff" /><circle cx="750" cy="350" r="1.5" fill="#fff" /><circle cx="850" cy="350" r="1.5" fill="#fff" />
  </g>

  <!-- ════════════ PANE 1: iOS GlassmorphicCard (Floating Light Tint) ════════════ -->
  <g class="pane1" filter="url(#shadow-light)">
    <!-- Base frosted card boundary -->
    <rect width="320" height="200" rx="20" fill="url(#glass-light)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
    
    <!-- Refracted Color Blobs moving behind the glass card -->
    <g clip-path="url(#clip-card1)" filter="url(#refract-blur)">
      <circle class="blob1" cx="80" cy="100" r="80" fill="#7c3aed" opacity="0.75" />
      <circle class="blob2" cx="240" cy="160" r="70" fill="#f43f5e" opacity="0.65" />
    </g>

    <!-- Highlight glares on glass edges -->
    <rect width="320" height="200" rx="20" fill="url(#shimmer)" stroke="rgba(255, 255, 255, 0.28)" stroke-width="1.5" />
    <line x1="24" y1="2" x2="296" y2="2" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1" stroke-linecap="round" />

    <!-- Engraved Code &amp; Components -->
    <g transform="translate(24, 26)">
      <!-- Card header -->
      <rect width="66" height="16" rx="4" fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
      <text class="fs" x="33" y="11" fill="#fff" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="0.5">iOS NATIVE</text>
      
      <!-- Code Snippet -->
      <g transform="translate(0, 36)">
        <text class="fm" font-size="11" fill="#ddd" font-weight="700">&lt;<tspan fill="#a78bfa">GlassmorphicCard</tspan></text>
        <text class="fm" y="18" font-size="11" fill="#ddd">  intensity={<tspan fill="#fbbf24">30</tspan>}</text>
        <text class="fm" y="34" font-size="11" fill="#ddd">  tint=<tspan fill="#fbbf24">"light"</tspan></text>
        <text class="fm" y="50" font-size="11" fill="#ddd">  borderRadius={<tspan fill="#fbbf24">20</tspan>}</text>
        <text class="fm" y="66" font-size="11" fill="#ddd">  borderColor=<tspan fill="#34d399">"#fff"</tspan></text>
        <text class="fm" y="82" font-size="11" fill="#ddd">&gt;</text>
        <!-- Child illustration preview inside card -->
        <g transform="translate(12, 98)">
          <circle cx="8" cy="8" r="8" fill="#fff" opacity="0.9" />
          <rect x="24" y="2" width="100" height="12" rx="3" fill="#fff" opacity="0.6" />
        </g>
      </g>
    </g>
  </g>

  <!-- ════════════ PANE 2: Android &amp; Web GlassmorphicInput (Floating Dark Tint) ════════════ -->
  <g class="pane2" filter="url(#shadow-dark)">
    <!-- Base frosted card boundary -->
    <rect width="320" height="200" rx="20" fill="url(#glass-dark)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    
    <!-- Refracted Color Blobs moving behind the glass card -->
    <g clip-path="url(#clip-card2)" filter="url(#refract-blur)">
      <circle class="blob2" cx="80" cy="60" r="75" fill="#06b6d4" opacity="0.7" />
      <circle class="blob3" cx="220" cy="130" r="90" fill="#3b82f6" opacity="0.55" />
    </g>

    <!-- Highlight glares on glass edges -->
    <rect width="320" height="200" rx="20" fill="url(#shimmer)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1" />
    <line x1="24" y1="2" x2="296" y2="2" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" stroke-linecap="round" />

    <!-- Engraved Code &amp; Components -->
    <g transform="translate(24, 26)">
      <!-- Card header -->
      <rect width="82" height="16" rx="4" fill="rgba(15, 23, 42, 0.3)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
      <text class="fs" x="41" y="11" fill="#22d3ee" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="0.5">ANDROID/WEB</text>
      
      <!-- Code Snippet -->
      <g transform="translate(0, 36)">
        <text class="fm" font-size="11" fill="#bbb" font-weight="700">&lt;<tspan fill="#22d3ee">GlassmorphicInput</tspan></text>
        <text class="fm" y="18" font-size="11" fill="#bbb">  tint=<tspan fill="#f59e0b">"dark"</tspan></text>
        <text class="fm" y="34" font-size="11" fill="#bbb">  intensity={<tspan fill="#fbbf24">40</tspan>}</text>
        <text class="fm" y="50" font-size="11" fill="#bbb">  placeholder=<tspan fill="#fbbf24">"Search..."</tspan></text>
        <text class="fm" y="66" font-size="11" fill="#bbb">/&gt;</text>
        <!-- Child illustration preview inside card -->
        <g transform="translate(0, 84)">
          <rect width="272" height="30" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
          <path d="M14,15 L22,15 M18,11 L18,19" stroke="#52525b" stroke-width="2" stroke-linecap="round" />
          <text class="fs" x="32" y="18" fill="rgba(255,255,255,0.3)" font-size="9">Search transactions...</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ════════════ PANE 3: GlassmorphicButton standalone key (Bridging Overlay) ════════════ -->
  <g class="pane3" filter="url(#shadow-button)">
    <!-- Base frosted card boundary -->
    <rect width="220" height="56" rx="14" fill="url(#glass-light)" stroke="rgba(255, 255, 255, 0.28)" stroke-width="1.2" />
    
    <!-- Refracted Color Blobs moving behind the button key -->
    <g clip-path="url(#clip-card3)" filter="url(#refract-blur)">
      <circle class="blob3" cx="110" cy="28" r="60" fill="#f43f5e" opacity="0.8" />
    </g>

    <!-- Highlight glares -->
    <rect width="220" height="56" rx="14" fill="url(#shimmer)" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1.5" />
    
    <!-- Button text label representing code -->
    <text class="fs" x="110" y="33" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1" filter="drop-shadow(0 2px 4px rgba(244,63,94,0.4))">&lt;GlassmorphicButton /&gt;</text>
  </g>

  <!-- Floating Vector Badges in corners -->
  <g transform="translate(68, 300)">
    <g class="badge-f">
      <rect width="80" height="20" rx="10" fill="rgba(124,58,237,0.18)" stroke="#8b5cf6" stroke-width="1.2" />
      <text class="fs" x="40" y="13" fill="#c4b5fd" font-size="8" font-weight="700" text-anchor="middle">🔮 EXPO READY</text>
    </g>
  </g>
  <g transform="translate(712, 100)">
    <g class="badge-f" style="animation-delay: 1.5s">
      <rect width="88" height="20" rx="10" fill="rgba(6,182,212,0.18)" stroke="#06b6d4" stroke-width="1.2" />
      <text class="fs" x="44" y="13" fill="#a5f3fc" font-size="8" font-weight="700" text-anchor="middle">⚡ Liquid 60FPS</text>
    </g>
  </g>
  <g transform="translate(690, 400)">
    <g class="badge-f" style="animation-delay: 0.8s">
      <rect width="98" height="20" rx="10" fill="rgba(244,63,94,0.18)" stroke="#f43f5e" stroke-width="1.2" />
      <text class="fs" x="49" y="13" fill="#fecdd3" font-size="8" font-weight="700" text-anchor="middle">🧊 ZERO DEPS</text>
    </g>
  </g>

  <!-- Bottom Visual Description Title -->
  <text class="fs" x="430" y="460" fill="#4b5563" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="2">LIGHT GLASS SHEET (iOS) · DARK GLASS SHEET (ANDROID/WEB) · BUTTON KEY</text>
</svg>
